<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540">
  <desc>Azure App Service の代表的なユースケース: 企業 Web サイト、REST API バックエンド、社内業務アプリ、モバイルバックエンド。マイクロサービスや既存アプリのリフト＆シフトにも活用できます。</desc>
  <defs>
    <linearGradient id="bg-light" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5F7FA"/>
      <stop offset="100%" stop-color="#EEF1F5"/>
    </linearGradient>
    <linearGradient id="header-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0D1B2A"/>
      <stop offset="100%" stop-color="#1A3A4A"/>
    </linearGradient>
    <linearGradient id="card-a" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1B2A4A"/>
      <stop offset="100%" stop-color="#1A3A4A"/>
    </linearGradient>
    <linearGradient id="card-b" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A3A4A"/>
      <stop offset="100%" stop-color="#2A7A8C"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="960" height="540" fill="url(#bg-light)"/>

  <!-- ヘッダーバー -->
  <rect x="0" y="0" width="960" height="72" fill="url(#header-grad)"/>
  <text x="40" y="47" font-size="26" font-weight="bold" fill="#FFFFFF" font-family="Segoe UI">代表的なユースケース</text>
  <text x="900" y="47" font-size="13" fill="#8B939E" font-family="Segoe UI" text-anchor="end">6 / 7</text>

  <!-- ユースケース 1: 企業 Web サイト -->
  <rect x="40" y="88" width="430" height="180" rx="10" fill="url(#card-a)"/>
  <text x="60" y="120" font-size="28" fill="#FFFFFF" font-family="Segoe UI">🌐</text>
  <text x="105" y="118" font-size="15" font-weight="bold" fill="#FFFFFF" font-family="Segoe UI">企業 Web サイト・EC サイト</text>
  <line x1="60" y1="128" x2="450" y2="128" stroke="#2A7A8C" stroke-width="1"/>
  <text x="60" y="150" font-size="12" fill="#B0C4D8" font-family="Segoe UI">• コーポレートサイト〜大規模 EC まで対応</text>
  <text x="60" y="170" font-size="12" fill="#B0C4D8" font-family="Segoe UI">• WordPress / Laravel などをそのまま移行可能</text>
  <text x="60" y="190" font-size="12" fill="#B0C4D8" font-family="Segoe UI">• CDN・Traffic Manager と組み合わせてグローバル配信</text>
  <text x="60" y="210" font-size="12" fill="#B0C4D8" font-family="Segoe UI">• 自動スケールでアクセス集中にも対応</text>
  <rect x="60" y="228" width="200" height="26" rx="13" fill="#1A3A4A" stroke="#00D4FF" stroke-width="1"/>
  <text x="160" y="246" font-size="11" fill="#00D4FF" font-family="Segoe UI" text-anchor="middle">Standard / Premium プラン推奨</text>

  <!-- ユースケース 2: REST API バックエンド -->
  <rect x="490" y="88" width="430" height="180" rx="10" fill="url(#card-b)"/>
  <text x="510" y="120" font-size="28" fill="#FFFFFF" font-family="Segoe UI">⚡</text>
  <text x="555" y="118" font-size="15" font-weight="bold" fill="#FFFFFF" font-family="Segoe UI">REST API / マイクロサービス</text>
  <line x1="510" y1="128" x2="900" y2="128" stroke="#1B2A4A" stroke-width="1"/>
  <text x="510" y="150" font-size="12" fill="#B0C4D8" font-family="Segoe UI">• Azure API Management との統合で API 公開</text>
  <text x="510" y="170" font-size="12" fill="#B0C4D8" font-family="Segoe UI">• .NET / Java / Node.js / Python で REST API 構築</text>
  <text x="510" y="190" font-size="12" fill="#B0C4D8" font-family="Segoe UI">• VNet 統合でセキュアなバックエンド API</text>
  <text x="510" y="210" font-size="12" fill="#B0C4D8" font-family="Segoe UI">• OpenAPI Spec との相性◎</text>
  <rect x="510" y="228" width="200" height="26" rx="13" fill="#1A3A4A" stroke="#00D4FF" stroke-width="1"/>
  <text x="610" y="246" font-size="11" fill="#00D4FF" font-family="Segoe UI" text-anchor="middle">Standard / Isolated プラン推奨</text>

  <!-- ユースケース 3: 社内業務アプリ -->
  <rect x="40" y="285" width="430" height="165" rx="10" fill="#FFFFFF" stroke="#C8CED6"/>
  <rect x="40" y="285" width="6" height="165" rx="3" fill="#1B2A4A"/>
  <text x="62" y="315" font-size="28" fill="#1B2A4A" font-family="Segoe UI">🏢</text>
  <text x="107" y="313" font-size="15" font-weight="bold" fill="#1E2328" font-family="Segoe UI">社内業務アプリのクラウド移行</text>
  <line x1="62" y1="322" x2="450" y2="322" stroke="#EEF1F5" stroke-width="1"/>
  <text x="62" y="342" font-size="12" fill="#4A5568" font-family="Segoe UI">• オンプレ Web アプリのリフト＆シフト移行</text>
  <text x="62" y="362" font-size="12" fill="#4A5568" font-family="Segoe UI">• Azure AD 認証で社員認証をシームレスに統合</text>
  <text x="62" y="382" font-size="12" fill="#4A5568" font-family="Segoe UI">• VNet 統合・ハイブリッド接続でオンプレ連携</text>
  <text x="62" y="402" font-size="12" fill="#4A5568" font-family="Segoe UI">• Isolated プランで完全プライベート環境を実現</text>
  <rect x="62" y="418" width="180" height="22" rx="11" fill="#EEF1F5" stroke="#C8CED6"/>
  <text x="152" y="434" font-size="11" fill="#4A5568" font-family="Segoe UI" text-anchor="middle">Isolated / Premium 推奨</text>

  <!-- ユースケース 4: モバイルバックエンド -->
  <rect x="490" y="285" width="430" height="165" rx="10" fill="#FFFFFF" stroke="#C8CED6"/>
  <rect x="490" y="285" width="6" height="165" rx="3" fill="#2A7A8C"/>
  <text x="512" y="315" font-size="28" fill="#2A7A8C" font-family="Segoe UI">📱</text>
  <text x="557" y="313" font-size="15" font-weight="bold" fill="#1E2328" font-family="Segoe UI">モバイルアプリバックエンド</text>
  <line x1="512" y1="322" x2="900" y2="322" stroke="#EEF1F5" stroke-width="1"/>
  <text x="512" y="342" font-size="12" fill="#4A5568" font-family="Segoe UI">• iOS / Android 向け API バックエンドを迅速構築</text>
  <text x="512" y="362" font-size="12" fill="#4A5568" font-family="Segoe UI">• Azure Notification Hubs / Storage と連携</text>
  <text x="512" y="382" font-size="12" fill="#4A5568" font-family="Segoe UI">• プッシュ通知・オフライン同期も対応可能</text>
  <text x="512" y="402" font-size="12" fill="#4A5568" font-family="Segoe UI">• GitHub Actions で CI/CD パイプライン自動化</text>
  <rect x="512" y="418" width="180" height="22" rx="11" fill="#EEF1F5" stroke="#C8CED6"/>
  <text x="602" y="434" font-size="11" fill="#4A5568" font-family="Segoe UI" text-anchor="middle">Standard / Basic 推奨</text>

  <!-- フッター情報源 -->
  <a href="https://learn.microsoft.com/ja-jp/azure/app-service/getting-started">
    <text x="40" y="528" font-size="10" fill="#00D4FF" font-family="Segoe UI">📖 MS Learn — App Service の使い方 →</text>
  </a>
</svg>
