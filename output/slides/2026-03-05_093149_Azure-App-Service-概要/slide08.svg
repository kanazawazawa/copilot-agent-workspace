<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540">
  <desc>まとめ: Azure App Service は PaaS として Web アプリ・API・モバイルバックエンドをインフラ管理不要で運用できる。多言語対応・自動スケール・CI/CD・デプロイスロットが揃う。参考リンク: MS Learn ドキュメント。</desc>
  <defs>
    <linearGradient id="bg-dark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0D1B2A"/>
      <stop offset="100%" stop-color="#1B2A4A"/>
    </linearGradient>
    <radialGradient id="glow-right" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#00D4FF" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#00D4FF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- 背景 -->
  <rect width="960" height="540" fill="url(#bg-dark)"/>

  <!-- 装飾円 -->
  <circle cx="780" cy="480" r="300" fill="#1A3A4A" opacity="0.6"/>
  <circle cx="920" cy="380" r="180" fill="#2A7A8C" opacity="0.4"/>
  <circle cx="750" cy="120" r="180" fill="url(#glow-right)"/>

  <!-- ネットワーク装飾（右上） -->
  <circle cx="860" cy="60" r="3" fill="#FFFFFF" opacity="0.3"/>
  <circle cx="900" cy="40" r="3" fill="#FFFFFF" opacity="0.3"/>
  <circle cx="930" cy="80" r="3" fill="#FFFFFF" opacity="0.3"/>
  <circle cx="890" cy="100" r="3" fill="#FFFFFF" opacity="0.3"/>
  <line x1="860" y1="60" x2="900" y2="40" stroke="#FFFFFF" stroke-width="1" opacity="0.15"/>
  <line x1="900" y1="40" x2="930" y2="80" stroke="#FFFFFF" stroke-width="1" opacity="0.15"/>
  <line x1="930" y1="80" x2="890" y2="100" stroke="#FFFFFF" stroke-width="1" opacity="0.15"/>

  <!-- 左アクセントライン -->
  <rect x="60" y="80" width="4" height="340" fill="#00D4FF" opacity="0.8"/>

  <!-- タイトル -->
  <text x="80" y="115" font-size="30" font-weight="bold" fill="#FFFFFF" font-family="Segoe UI">まとめ</text>
  <line x1="80" y1="125" x2="260" y2="125" stroke="#00D4FF" stroke-width="2"/>

  <!-- サマリーポイント -->
  <circle cx="88" cy="158" r="8" fill="#00D4FF"/>
  <text x="88" y="163" font-size="11" fill="#0D1B2A" font-family="Segoe UI" text-anchor="middle" font-weight="bold">1</text>
  <text x="108" y="163" font-size="14" fill="#FFFFFF" font-family="Segoe UI" font-weight="bold">フルマネージド PaaS</text>
  <text x="108" y="182" font-size="12" fill="#B0C4D8" font-family="Segoe UI">OS・ミドルウェア・セキュリティパッチの管理は Azure が担当。開発者はコードに集中</text>

  <circle cx="88" cy="215" r="8" fill="#00D4FF"/>
  <text x="88" y="220" font-size="11" fill="#0D1B2A" font-family="Segoe UI" text-anchor="middle" font-weight="bold">2</text>
  <text x="108" y="220" font-size="14" fill="#FFFFFF" font-family="Segoe UI" font-weight="bold">マルチ言語・マルチ OS</text>
  <text x="108" y="239" font-size="12" fill="#B0C4D8" font-family="Segoe UI">.NET / Java / Node.js / Python / PHP / Ruby、Windows・Linux・Docker に対応</text>

  <circle cx="88" cy="272" r="8" fill="#00D4FF"/>
  <text x="88" y="277" font-size="11" fill="#0D1B2A" font-family="Segoe UI" text-anchor="middle" font-weight="bold">3</text>
  <text x="108" y="277" font-size="14" fill="#FFFFFF" font-family="Segoe UI" font-weight="bold">高可用性・自動スケール</text>
  <text x="108" y="296" font-size="12" fill="#B0C4D8" font-family="Segoe UI">SLA 99.95%。負荷に応じた自動スケールアウト、ゾーン冗長（Premium 以上）</text>

  <circle cx="88" cy="329" r="8" fill="#00D4FF"/>
  <text x="88" y="334" font-size="11" fill="#0D1B2A" font-family="Segoe UI" text-anchor="middle" font-weight="bold">4</text>
  <text x="108" y="334" font-size="14" fill="#FFFFFF" font-family="Segoe UI" font-weight="bold">安全なリリース管理</text>
  <text x="108" y="353" font-size="12" fill="#B0C4D8" font-family="Segoe UI">デプロイスロットでゼロダウンタイムデプロイ。CI/CD で自動デプロイ・即時ロールバック</text>

  <circle cx="88" cy="386" r="8" fill="#00D4FF"/>
  <text x="88" y="391" font-size="11" fill="#0D1B2A" font-family="Segoe UI" text-anchor="middle" font-weight="bold">5</text>
  <text x="108" y="391" font-size="14" fill="#FFFFFF" font-family="Segoe UI" font-weight="bold">柔軟なプラン選択</text>
  <text x="108" y="410" font-size="12" fill="#B0C4D8" font-family="Segoe UI">無料から Isolated まで 5 段階。ワークロードとセキュリティ要件に応じて選択可能</text>

  <!-- 参考リンク -->
  <rect x="60" y="432" width="840" height="70" rx="8" fill="#FFFFFF" opacity="0.06"/>
  <text x="80" y="454" font-size="12" font-weight="bold" fill="#B0C4D8" font-family="Segoe UI">📚 参考リンク（MS Learn 公式ドキュメント）</text>
  <a href="https://learn.microsoft.com/ja-jp/azure/app-service/overview">
    <text x="80" y="474" font-size="11" fill="#00D4FF" font-family="Segoe UI">• Azure App Service 概要 → learn.microsoft.com/ja-jp/azure/app-service/overview</text>
  </a>
  <a href="https://learn.microsoft.com/ja-jp/azure/app-service/overview-hosting-plans">
    <text x="80" y="492" font-size="11" fill="#00D4FF" font-family="Segoe UI">• App Service プランの概要 → learn.microsoft.com/ja-jp/azure/app-service/overview-hosting-plans</text>
  </a>
</svg>
