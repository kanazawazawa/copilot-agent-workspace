<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540">
  <defs>
    <linearGradient id="bg-light" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5F7FA"/>
      <stop offset="100%" stop-color="#EEF1F5"/>
    </linearGradient>
    <linearGradient id="header-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1B2A4A"/>
      <stop offset="100%" stop-color="#1A3A4A"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="960" height="540" fill="url(#bg-light)"/>

  <!-- Header -->
  <rect x="0" y="0" width="960" height="70" fill="url(#header-grad)"/>
  <text x="40" y="46" font-size="24" font-weight="bold" fill="#FFFFFF" font-family="Segoe UI">Architecture: Basic Web App (Dev / POC)</text>

  <!-- Subheading -->
  <text x="40" y="105" font-size="15" fill="#4A5568" font-family="Segoe UI">Simple single-region architecture for learning, prototyping, and proof-of-concept deployments.</text>

  <!-- Architecture diagram -->
  <!-- User -->
  <circle cx="120" cy="260" r="30" fill="#1B2A4A"/>
  <text x="120" y="266" font-size="20" fill="#FFFFFF" font-family="Segoe UI" text-anchor="middle">👤</text>
  <text x="120" y="310" font-size="13" font-weight="bold" fill="#1E2328" font-family="Segoe UI" text-anchor="middle">User</text>
  <text x="120" y="328" font-size="11" fill="#4A5568" font-family="Segoe UI" text-anchor="middle">HTTPS Request</text>

  <!-- Arrow 1 -->
  <line x1="155" y1="260" x2="225" y2="260" stroke="#00D4FF" stroke-width="2"/>
  <polygon points="225,254 237,260 225,266" fill="#00D4FF"/>

  <!-- Entra ID -->
  <rect x="235" y="145" width="140" height="55" rx="6" fill="#1A3A4A"/>
  <text x="305" y="170" font-size="13" font-weight="bold" fill="#FFFFFF" font-family="Segoe UI" text-anchor="middle">Microsoft</text>
  <text x="305" y="188" font-size="13" font-weight="bold" fill="#FFFFFF" font-family="Segoe UI" text-anchor="middle">Entra ID</text>

  <!-- Dashed line to Entra ID -->
  <line x1="305" y1="200" x2="305" y2="230" stroke="#C8CED6" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="330" y="220" font-size="10" fill="#8B939E" font-family="Segoe UI">Easy Auth</text>

  <!-- App Service -->
  <rect x="240" y="230" width="130" height="60" rx="8" fill="#1B2A4A"/>
  <text x="305" y="257" font-size="14" font-weight="bold" fill="#FFFFFF" font-family="Segoe UI" text-anchor="middle">App Service</text>
  <text x="305" y="278" font-size="11" fill="#B0C4D8" font-family="Segoe UI" text-anchor="middle">.azurewebsites.net</text>

  <!-- Arrow 2 -->
  <line x1="375" y1="260" x2="445" y2="260" stroke="#00D4FF" stroke-width="2"/>
  <polygon points="445,254 457,260 445,266" fill="#00D4FF"/>

  <!-- SQL Database -->
  <rect x="460" y="230" width="130" height="60" rx="8" fill="#1A3A4A"/>
  <text x="525" y="257" font-size="14" font-weight="bold" fill="#FFFFFF" font-family="Segoe UI" text-anchor="middle">Azure SQL</text>
  <text x="525" y="278" font-size="11" fill="#B0C4D8" font-family="Segoe UI" text-anchor="middle">Database</text>

  <!-- Application Insights -->
  <rect x="320" y="345" width="170" height="50" rx="6" fill="#2A7A8C"/>
  <text x="405" y="375" font-size="13" font-weight="bold" fill="#FFFFFF" font-family="Segoe UI" text-anchor="middle">Application Insights</text>

  <!-- Dashed lines to App Insights -->
  <line x1="305" y1="290" x2="380" y2="345" stroke="#C8CED6" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="525" y1="290" x2="430" y2="345" stroke="#C8CED6" stroke-width="1.5" stroke-dasharray="5,3"/>

  <!-- Right side: Characteristics -->
  <rect x="640" y="130" width="280" height="290" rx="8" fill="#EEF1F5" stroke="#C8CED6"/>
  <text x="660" y="160" font-size="15" font-weight="bold" fill="#1E2328" font-family="Segoe UI">Characteristics</text>
  <line x1="660" y1="170" x2="900" y2="170" stroke="#C8CED6" stroke-width="1"/>

  <text x="660" y="198" font-size="13" fill="#2A7A8C" font-family="Segoe UI" font-weight="bold">✓ Best for</text>
  <text x="660" y="218" font-size="12" fill="#4A5568" font-family="Segoe UI">  POC, development, learning</text>

  <text x="660" y="248" font-size="13" fill="#2A7A8C" font-family="Segoe UI" font-weight="bold">✓ Components</text>
  <text x="660" y="268" font-size="12" fill="#4A5568" font-family="Segoe UI">  App Service + SQL Database</text>
  <text x="660" y="288" font-size="12" fill="#4A5568" font-family="Segoe UI">  + Entra ID + App Insights</text>

  <text x="660" y="318" font-size="13" fill="#2A7A8C" font-family="Segoe UI" font-weight="bold">✓ Networking</text>
  <text x="660" y="338" font-size="12" fill="#4A5568" font-family="Segoe UI">  Public endpoints (simple)</text>

  <text x="660" y="368" font-size="13" fill="#8B6914" font-family="Segoe UI" font-weight="bold">⚠ Limitations</text>
  <text x="660" y="388" font-size="12" fill="#4A5568" font-family="Segoe UI">  No WAF, no VNet, no HA</text>
  <text x="660" y="408" font-size="12" fill="#4A5568" font-family="Segoe UI">  Not for production use</text>

  <!-- Footer -->
  <a href="https://learn.microsoft.com/en-us/azure/architecture/web-apps/app-service/architectures/basic-web-app">
    <text x="40" y="520" font-size="10" fill="#00D4FF" font-family="Segoe UI">📖 Source: Azure Architecture Center — Basic Web App</text>
  </a>
  <text x="920" y="520" font-size="11" fill="#8B939E" font-family="Segoe UI" text-anchor="end">7 / 10</text>
</svg>
