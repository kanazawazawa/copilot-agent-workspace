<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540">
  <desc>App Service Plan はアプリを実行するコンピューティングリソースを定義します。Free/Shared（開発・検証）、Basic（小規模本番）、Standard（本番・スケール）、Premium（高パフォーマンス）、Isolated（完全分離・エンタープライズ）の5段階。</desc>
  <defs>
    <linearGradient id="bg-light" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5F7FA"/>
      <stop offset="100%" stop-color="#EEF1F5"/>
    </linearGradient>
    <linearGradient id="header-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0D1B2A"/>
      <stop offset="100%" stop-color="#1A3A4A"/>
    </linearGradient>
    <linearGradient id="row-highlight" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1B2A4A"/>
      <stop offset="100%" stop-color="#1A3A4A"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="960" height="540" fill="url(#bg-light)"/>

  <!-- ヘッダーバー -->
  <rect x="0" y="0" width="960" height="72" fill="url(#header-grad)"/>
  <text x="40" y="47" font-size="26" font-weight="bold" fill="#FFFFFF" font-family="Segoe UI">App Service Plan — プラン比較</text>
  <text x="900" y="47" font-size="13" fill="#8B939E" font-family="Segoe UI" text-anchor="end">4 / 7</text>

  <!-- サブタイトル -->
  <text x="40" y="93" font-size="13" fill="#4A5568" font-family="Segoe UI">App Service Plan は、アプリを実行するコンピューティングリソース（CPU・メモリ・スケール上限・OS）を定義するプランです。</text>

  <!-- テーブルヘッダー -->
  <rect x="40" y="106" width="880" height="38" rx="4" fill="url(#row-highlight)"/>
  <text x="100" y="130" font-size="12" font-weight="bold" fill="#FFFFFF" font-family="Segoe UI">プラン</text>
  <text x="230" y="130" font-size="12" font-weight="bold" fill="#FFFFFF" font-family="Segoe UI">用途</text>
  <text x="430" y="130" font-size="12" font-weight="bold" fill="#FFFFFF" font-family="Segoe UI">主な特徴</text>
  <text x="680" y="130" font-size="12" font-weight="bold" fill="#FFFFFF" font-family="Segoe UI">スケール上限</text>
  <text x="810" y="130" font-size="12" font-weight="bold" fill="#FFFFFF" font-family="Segoe UI">SLA / カスタムドメイン</text>

  <!-- 行1: Free/Shared -->
  <rect x="40" y="144" width="880" height="52" rx="0" fill="#FFFFFF"/>
  <line x1="40" y1="196" x2="920" y2="196" stroke="#C8CED6" stroke-width="1"/>
  <rect x="40" y="144" width="6" height="52" fill="#8B939E"/>
  <text x="60" y="166" font-size="13" font-weight="bold" fill="#4A5568" font-family="Segoe UI">Free / Shared</text>
  <text x="60" y="184" font-size="11" fill="#8B939E" font-family="Segoe UI">F1 / D1</text>
  <text x="230" y="170" font-size="12" fill="#4A5568" font-family="Segoe UI">開発・検証・学習</text>
  <text x="430" y="166" font-size="11" fill="#4A5568" font-family="Segoe UI">共有インフラ、リソース制限あり</text>
  <text x="430" y="184" font-size="11" fill="#8B939E" font-family="Segoe UI">商用利用非推奨</text>
  <text x="680" y="170" font-size="12" fill="#4A5568" font-family="Segoe UI">1 インスタンス（固定）</text>
  <text x="810" y="166" font-size="11" fill="#8B939E" font-family="Segoe UI">SLA なし</text>
  <text x="810" y="184" font-size="11" fill="#8B939E" font-family="Segoe UI">カスタムドメイン不可 (F1)</text>

  <!-- 行2: Basic -->
  <rect x="40" y="196" width="880" height="52" fill="#F5F7FA"/>
  <line x1="40" y1="248" x2="920" y2="248" stroke="#C8CED6" stroke-width="1"/>
  <rect x="40" y="196" width="6" height="52" fill="#2A7A8C"/>
  <text x="60" y="218" font-size="13" font-weight="bold" fill="#1E2328" font-family="Segoe UI">Basic</text>
  <text x="60" y="236" font-size="11" fill="#8B939E" font-family="Segoe UI">B1 / B2 / B3</text>
  <text x="230" y="222" font-size="12" fill="#4A5568" font-family="Segoe UI">小規模な本番ワークロード</text>
  <text x="430" y="218" font-size="11" fill="#4A5568" font-family="Segoe UI">専用 VM、手動スケール</text>
  <text x="430" y="236" font-size="11" fill="#8B939E" font-family="Segoe UI">デプロイスロットなし</text>
  <text x="680" y="222" font-size="12" fill="#4A5568" font-family="Segoe UI">最大 3 インスタンス</text>
  <text x="810" y="218" font-size="11" fill="#4A5568" font-family="Segoe UI">SLA 99.95%</text>
  <text x="810" y="236" font-size="11" fill="#4A5568" font-family="Segoe UI">カスタムドメイン ✓</text>

  <!-- 行3: Standard（推奨ハイライト） -->
  <rect x="40" y="248" width="880" height="52" fill="#FFFFFF"/>
  <line x1="40" y1="300" x2="920" y2="300" stroke="#C8CED6" stroke-width="1"/>
  <rect x="40" y="248" width="6" height="52" fill="#00D4FF"/>
  <text x="60" y="270" font-size="13" font-weight="bold" fill="#1E2328" font-family="Segoe UI">Standard ⭐</text>
  <text x="60" y="288" font-size="11" fill="#00D4FF" font-family="Segoe UI">S1 / S2 / S3</text>
  <text x="230" y="274" font-size="12" fill="#4A5568" font-family="Segoe UI">本番・スケール・スロット利用</text>
  <text x="430" y="270" font-size="11" fill="#4A5568" font-family="Segoe UI">自動スケール、デプロイスロット 5 個</text>
  <text x="430" y="288" font-size="11" fill="#4A5568" font-family="Segoe UI">Traffic Manager 連携</text>
  <text x="680" y="274" font-size="12" fill="#4A5568" font-family="Segoe UI">最大 10 インスタンス</text>
  <text x="810" y="270" font-size="11" fill="#4A5568" font-family="Segoe UI">SLA 99.95%</text>
  <text x="810" y="288" font-size="11" fill="#4A5568" font-family="Segoe UI">SSL / カスタムドメイン ✓</text>

  <!-- 行4: Premium -->
  <rect x="40" y="300" width="880" height="52" fill="#F5F7FA"/>
  <line x1="40" y1="352" x2="920" y2="352" stroke="#C8CED6" stroke-width="1"/>
  <rect x="40" y="300" width="6" height="52" fill="#1B2A4A"/>
  <text x="60" y="322" font-size="13" font-weight="bold" fill="#1E2328" font-family="Segoe UI">Premium</text>
  <text x="60" y="340" font-size="11" fill="#8B939E" font-family="Segoe UI">P1v3 ～ P3v3</text>
  <text x="230" y="326" font-size="12" fill="#4A5568" font-family="Segoe UI">高負荷・高パフォーマンス本番</text>
  <text x="430" y="322" font-size="11" fill="#4A5568" font-family="Segoe UI">ゾーン冗長、デプロイスロット 20 個</text>
  <text x="430" y="340" font-size="11" fill="#4A5568" font-family="Segoe UI">プライベートエンドポイント対応</text>
  <text x="680" y="326" font-size="12" fill="#4A5568" font-family="Segoe UI">最大 30 インスタンス</text>
  <text x="810" y="322" font-size="11" fill="#4A5568" font-family="Segoe UI">SLA 99.95%</text>
  <text x="810" y="340" font-size="11" fill="#4A5568" font-family="Segoe UI">全機能 ✓</text>

  <!-- 行5: Isolated -->
  <rect x="40" y="352" width="880" height="52" fill="#FFFFFF"/>
  <rect x="40" y="352" width="6" height="52" fill="#1A3A4A"/>
  <text x="60" y="374" font-size="13" font-weight="bold" fill="#1E2328" font-family="Segoe UI">Isolated</text>
  <text x="60" y="392" font-size="11" fill="#8B939E" font-family="Segoe UI">I1v2 ～ I6v2</text>
  <text x="230" y="378" font-size="12" fill="#4A5568" font-family="Segoe UI">完全分離・エンタープライズ</text>
  <text x="430" y="374" font-size="11" fill="#4A5568" font-family="Segoe UI">専用 VNet、ASE (App Service Env.)</text>
  <text x="430" y="392" font-size="11" fill="#4A5568" font-family="Segoe UI">最高のセキュリティ・コンプライアンス</text>
  <text x="680" y="378" font-size="12" fill="#4A5568" font-family="Segoe UI">最大 100 インスタンス</text>
  <text x="810" y="374" font-size="11" fill="#4A5568" font-family="Segoe UI">SLA 99.95%</text>
  <text x="810" y="392" font-size="11" fill="#4A5568" font-family="Segoe UI">完全分離ネットワーク ✓</text>

  <!-- 注記 -->
  <text x="40" y="425" font-size="11" fill="#8B939E" font-family="Segoe UI">⭐ Standard が一般的な本番用途で最初に選択すべきプラン。料金は選択するリージョン・SKU により異なります（Azure 料金計算ツールで見積もり）。</text>

  <!-- フッター情報源 -->
  <a href="https://learn.microsoft.com/ja-jp/azure/app-service/overview-hosting-plans">
    <text x="40" y="528" font-size="10" fill="#00D4FF" font-family="Segoe UI">📖 MS Learn — App Service プランの概要 →</text>
  </a>
</svg>
