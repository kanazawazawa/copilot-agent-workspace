<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540">
  <defs>
    <linearGradient id="bg-light" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5F7FA"/>
      <stop offset="100%" stop-color="#EEF1F5"/>
    </linearGradient>
    <linearGradient id="header-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1B2A4A"/>
      <stop offset="100%" stop-color="#1A3A4A"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="960" height="540" fill="url(#bg-light)"/>

  <!-- Header -->
  <rect x="0" y="0" width="960" height="70" fill="url(#header-grad)"/>
  <text x="40" y="46" font-size="24" font-weight="bold" fill="#FFFFFF" font-family="Segoe UI">Enterprise-Grade Security</text>

  <!-- Left column: Network Security -->
  <rect x="40" y="95" width="425" height="190" rx="8" fill="#EEF1F5" stroke="#C8CED6"/>
  <rect x="40" y="95" width="425" height="35" rx="8" fill="#1B2A4A"/>
  <rect x="40" y="118" width="425" height="12" fill="#1B2A4A"/>
  <text x="60" y="118" font-size="15" font-weight="bold" fill="#FFFFFF" font-family="Segoe UI">🔒 Network Security</text>

  <text x="60" y="160" font-size="13" fill="#4A5568" font-family="Segoe UI">• VNet Integration — secure outbound traffic</text>
  <text x="60" y="182" font-size="13" fill="#4A5568" font-family="Segoe UI">• Private Endpoints — eliminate public exposure</text>
  <text x="60" y="204" font-size="13" fill="#4A5568" font-family="Segoe UI">• Web Application Firewall (WAF) — block exploits</text>
  <text x="60" y="226" font-size="13" fill="#4A5568" font-family="Segoe UI">• IP Access Restrictions — allowlist-based filtering</text>
  <text x="60" y="248" font-size="13" fill="#4A5568" font-family="Segoe UI">• DDoS Protection — built-in Azure infrastructure</text>
  <text x="60" y="270" font-size="13" fill="#4A5568" font-family="Segoe UI">• NSG support for subnet-level traffic control</text>

  <!-- Right column: Identity & Access -->
  <rect x="495" y="95" width="425" height="190" rx="8" fill="#EEF1F5" stroke="#C8CED6"/>
  <rect x="495" y="95" width="425" height="35" rx="8" fill="#1A3A4A"/>
  <rect x="495" y="118" width="425" height="12" fill="#1A3A4A"/>
  <text x="515" y="118" font-size="15" font-weight="bold" fill="#FFFFFF" font-family="Segoe UI">🛡️ Identity &amp; Access Management</text>

  <text x="515" y="160" font-size="13" fill="#4A5568" font-family="Segoe UI">• Microsoft Entra ID — enterprise SSO</text>
  <text x="515" y="182" font-size="13" fill="#4A5568" font-family="Segoe UI">• Easy Auth — built-in authentication module</text>
  <text x="515" y="204" font-size="13" fill="#4A5568" font-family="Segoe UI">• Managed Identity — no credentials in code</text>
  <text x="515" y="226" font-size="13" fill="#4A5568" font-family="Segoe UI">• RBAC — fine-grained management permissions</text>
  <text x="515" y="248" font-size="13" fill="#4A5568" font-family="Segoe UI">• Mutual TLS — client certificate authentication</text>
  <text x="515" y="270" font-size="13" fill="#4A5568" font-family="Segoe UI">• Social sign-in (Google, Facebook, Microsoft)</text>

  <!-- Bottom left: Data Protection -->
  <rect x="40" y="305" width="425" height="160" rx="8" fill="#EEF1F5" stroke="#C8CED6"/>
  <rect x="40" y="305" width="425" height="35" rx="8" fill="#2A7A8C"/>
  <rect x="40" y="328" width="425" height="12" fill="#2A7A8C"/>
  <text x="60" y="328" font-size="15" font-weight="bold" fill="#FFFFFF" font-family="Segoe UI">🔐 Data Protection</text>

  <text x="60" y="368" font-size="13" fill="#4A5568" font-family="Segoe UI">• HTTPS enforced by default (auto-redirect)</text>
  <text x="60" y="390" font-size="13" fill="#4A5568" font-family="Segoe UI">• TLS 1.2+ (TLS 1.3 supported)</text>
  <text x="60" y="412" font-size="13" fill="#4A5568" font-family="Segoe UI">• Free managed SSL certificates</text>
  <text x="60" y="434" font-size="13" fill="#4A5568" font-family="Segoe UI">• Azure Key Vault integration for secrets</text>
  <text x="60" y="456" font-size="13" fill="#4A5568" font-family="Segoe UI">• App settings encrypted at rest</text>

  <!-- Bottom right: Compliance -->
  <rect x="495" y="305" width="425" height="160" rx="8" fill="#EEF1F5" stroke="#C8CED6"/>
  <rect x="495" y="305" width="425" height="35" rx="8" fill="#1B2A4A"/>
  <rect x="495" y="328" width="425" height="12" fill="#1B2A4A"/>
  <text x="515" y="328" font-size="15" font-weight="bold" fill="#FFFFFF" font-family="Segoe UI">✅ Compliance &amp; Governance</text>

  <text x="515" y="368" font-size="13" fill="#4A5568" font-family="Segoe UI">• ISO 27001 / 27018 certified</text>
  <text x="515" y="390" font-size="13" fill="#4A5568" font-family="Segoe UI">• SOC 1, SOC 2, SOC 3 audited</text>
  <text x="515" y="412" font-size="13" fill="#4A5568" font-family="Segoe UI">• PCI DSS Level 1 compliant</text>
  <text x="515" y="434" font-size="13" fill="#4A5568" font-family="Segoe UI">• Microsoft Defender for App Service</text>
  <text x="515" y="456" font-size="13" fill="#4A5568" font-family="Segoe UI">• Continuous compliance monitoring</text>

  <!-- Footer -->
  <a href="https://learn.microsoft.com/en-us/azure/app-service/overview-security">
    <text x="40" y="520" font-size="10" fill="#00D4FF" font-family="Segoe UI">📖 Source: MS Learn — App Service Security Overview</text>
  </a>
  <text x="920" y="520" font-size="11" fill="#8B939E" font-family="Segoe UI" text-anchor="end">6 / 10</text>
</svg>
